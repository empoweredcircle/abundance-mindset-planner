<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyAMP</title>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #F2F4F8; font-family: sans-serif; }</style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    window.storage = {
      get: async function(key) {
        var v = localStorage.getItem(key);
        if (v === null) throw new Error("Not found");
        return { key: key, value: v };
      },
      set: async function(key, value) {
        localStorage.setItem(key, value);
        return { key: key, value: value };
      },
      delete: async function(key) {
        localStorage.removeItem(key);
        return { key: key, deleted: true };
      },
      list: async function(prefix) {
        prefix = prefix || "";
        var keys = Object.keys(localStorage).filter(function(k) { return k.startsWith(prefix); });
        return { keys: keys };
      }
    };
  </script>
  <script>
    var e = React.createElement;
    function App() {
      return e("div", { style: { padding: 40, textAlign: "center" } },
        e("h1", { style: { color: "#7B4BBF", fontSize: 32, marginBottom: 16 } }, "MyAMP"),
        e("p", { style: { color: "#444", fontSize: 18 } }, "Abundance Mindset Planner"),
        e("p", { style: { color: "#888", fontSize: 14, marginTop: 12 } }, "Loading full app...")
      );
    }
    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(e(App));
  </script>
</body>
</html>
