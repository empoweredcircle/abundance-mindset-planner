    // localStorage shim matching window.storage API
    window.storage = {
      get: async function(key) {
        var value = localStorage.getItem(key);
        if (value === null) throw new Error("Not found");
        return { key: key, value: value };
      },
      set: async function(key, value) {
        localStorage.setItem(key, value);
        return { key: key, value: value };
      },
      delete: async function(key) {
        localStorage.removeItem(key);
        return { key: key, deleted: true };
      },
      list: async function(prefix) {
        prefix = prefix || "";
        var keys = Object.keys(localStorage).filter(function(k) { return k.startsWith(prefix); });

function useStorage(key, defaultValue) {
  const [value, setValue] = useState(defaultValue);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    (async () => {
      try {
        const result = await window.storage.get(key);
        if (result) setValue(JSON.parse(result.value));
      } catch {}
      setLoaded(true);
    })();
  }, [key]);
  const set = async (newVal) => {
    const v = typeof newVal === "function" ? newVal(value) : newVal;
    setValue(v);
    try { await window.storage.set(key, JSON.stringify(v)); } catch {}
  };
  return [value, set, loaded];
}

function BreathTimer() {
  const [phase, setPhase] = useState("idle");
  const [count, setCount] = useState(0);
  const [breathsDone, setBreathsDone] = useState(0);
  const [phaseIdx, setPhaseIdx] = useState(0);
  const intervalRef = useRef(null);
  const phases = [
    { name: "Inhale", duration: 4, color: "#00897B" },
    { name: "Hold", duration: 2, color: "#7B4BBF" },
    { name: "Exhale", duration: 6, color: "#1E88E5" },
  ];

  const stop = () => { clearInterval(intervalRef.current); setPhase("idle"); setCount(0); setPhaseIdx(0); };
  const start = () => {
    setPhase("running"); setPhaseIdx(0); setCount(phases[0].duration); setBreathsDone(0);
    let cp = 0, cc = phases[0].duration, b = 0;
    intervalRef.current = setInterval(() => {
      cc--;
      if (cc <= 0) {
        cp = (cp + 1) % 3;
        if (cp === 0) { b++; setBreathsDone(b); if (b >= 5) { clearInterval(intervalRef.current); setPhase("done"); return; } }
        cc = phases[cp].duration; setPhaseIdx(cp);
      }
      setCount(cc);
    }, 1000);
  };
  useEffect(() => () => clearInterval(intervalRef.current), []);

  const cur = phases[phaseIdx];
  const prog = phase === "running" ? ((phases[phaseIdx].duration - count) / phases[phaseIdx].duration) * 100 : 0;
  const r = 54, circ = 2 * Math.PI * r;

  return (
    <div style={{ textAlign: "center", padding: "16px 0 8px" }}>
      <svg width={120} height={120} style={{ display: "block", margin: "0 auto 16px" }}>
        <circle cx={60} cy={60} r={r} fill="none" stroke="#F0F0F0" strokeWidth={6} />
        {phase === "running" && (
          <circle cx={60} cy={60} r={r} fill="none" stroke={cur.color} strokeWidth={6}
            strokeDasharray={circ} strokeDashoffset={circ * (1 - prog / 100)}
            strokeLinecap="round" transform="rotate(-90 60 60)"
            style={{ transition: "stroke-dashoffset 0.9s linear" }} />
        )}
        <text x={60} y={phase === "running" ? 55 : 65} textAnchor="middle"
          style={{ fontSize: phase === "running" ? 26 : 34, fontWeight: 700, fill: phase === "running" ? cur.color : "#CCCCCC", fontFamily: "sans-serif" }}>
          {phase === "idle" ? "🫁" : phase === "done" ? "✅" : count}
        </text>
        {phase === "running" && (
          <text x={60} y={74} textAnchor="middle" style={{ fontSize: 15, fill: cur.color, fontFamily: "sans-serif", letterSpacing: 1 }}>
            {cur.name.toUpperCase()}
          </text>
        )}
      </svg>
      {phase === "running" && (
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 14 }}>
          {[...Array(5)].map((_, i) => (
            <div key={i} style={{ width: 10, height: 10, borderRadius: "50%", background: i < breathsDone ? "#00897B" : "#E0E0E0", transition: "background 0.3s" }} />
          ))}
        </div>
      )}
      {phase === "done" && <p style={{ color: "#00897B", marginBottom: 14, fontSize: 15, fontWeight: 600 }}>5 breaths complete ✓</p>}
      <button onClick={phase === "idle" || phase === "done" ? start : stop} style={{
        padding: "10px 28px", borderRadius: 24, border: "none", cursor: "pointer",
        fontSize: 15, fontWeight: 700, letterSpacing: 0.5,
        background: phase === "running" ? "#FFEBEE" : "#E8F5E9",
        color: phase === "running" ? "#C62828" : "#2E7D32",
      }}>
        {phase === "idle" ? "START" : phase === "running" ? "STOP" : "AGAIN"}
      </button>
    </div>
  );
}

function ArchivePage({ onGoToDay }) {
  const [entries, setEntries] = useState([]);
  const [selected, setSelected] = useState(null);
  const [dayData, setDayData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      try {
        const keys = await window.storage.list("morning:");
        if (keys && keys.keys) {
          const dates = keys.keys
            .map(k => k.replace("morning:", ""))
            .filter(d => d !== todayKey())
            .sort((a, b) => b.localeCompare(a));
          setEntries(dates);
        }
      } catch {}
      setLoading(false);
    })();
  }, []);

  const loadDay = async (date) => {
    setSelected(date);
    setDayData(null);
    try {
      const [m, md, e] = await Promise.all([
        window.storage.get(`morning:${date}`),
        window.storage.get(`midday:${date}`),
        window.storage.get(`evening:${date}`),
      ]);
      setDayData({
        morning: m ? JSON.parse(m.value) : {},
        midday: md ? JSON.parse(md.value) : {},
        evening: e ? JSON.parse(e.value) : {},
      });
    } catch {}
  };

  const formatDate = (dateStr) => {
    const d = new Date(dateStr + "T12:00:00");
    return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
  };

  const moodForDate = (data) => {
    if (!data) return null;
    const m = MOOD_LEVELS.find(ml => ml.label === data.morning?.mood);
    return m || null;
  };

  const hasContent = (data) => {
    if (!data) return false;
    const all = { ...data.morning, ...data.midday, ...data.evening };
    return Object.values(all).some(v => v && v.trim && v.trim().length > 0);
  };

  if (loading) return (
    <div style={{ padding: "40px 0", textAlign: "center" }}>
      <p style={{ color: "#666", fontSize: 15 }}>Loading your archive...</p>
    </div>
  );

  if (selected && dayData) {
    const mood = moodForDate(dayData);
    return (
      <div>
        <button onClick={() => { setSelected(null); setDayData(null); }} style={{
          display: "flex", alignItems: "center", gap: 6, background: "none", border: "none",
          cursor: "pointer", color: "#7B4BBF", fontSize: 15, fontWeight: 700, marginBottom: 20, padding: 0,
        }}>
          ← Back to Archive
        </button>

        <div style={{ background: "#fff", borderRadius: 16, padding: "18px 16px", marginBottom: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          <p style={{ fontSize: 13, color: "#888", margin: "0 0 4px", textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>Entry for</p>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: "#1A1A2E", fontFamily: "'DM Serif Display', serif", margin: "0 0 8px" }}>{formatDate(selected)}</h2>
          {mood && (
            <div style={{ display: "inline-flex", alignItems: "center", gap: 6, background: mood.light, border: `1px solid ${mood.color}33`, borderRadius: 20, padding: "4px 12px" }}>
              <span style={{ fontSize: 16 }}>{mood.emoji}</span>
              <span style={{ fontSize: 13, fontWeight: 700, color: mood.color }}>Morning mood: {mood.label}</span>
            </div>
          )}
        </div>

        {/* Morning */}
        {(dayData.morning.g1 || dayData.morning.g2 || dayData.morning.g3 || dayData.morning.viz || dayData.morning.intention) && (
          <div style={{ background: "#fff", borderRadius: 16, padding: "18px 16px", marginBottom: 14, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", borderLeft: "4px solid #7B4BBF" }}>
            <p style={{ fontSize: 13, fontWeight: 800, color: "#7B4BBF", textTransform: "uppercase", letterSpacing: 1, margin: "0 0 14px" }}>🌅 Morning</p>
            {[dayData.morning.g1, dayData.morning.g2, dayData.morning.g3].filter(Boolean).map((g, i) => (
              <div key={i} style={{ marginBottom: 10 }}>

                <p style={{ fontSize: 15, color: "#222", lineHeight: 1.6, margin: 0 }}>{g}</p>
              </div>
            ))}
            {dayData.morning.intention && (
              <div style={{ marginTop: 10, background: "#F5F0FF", borderRadius: 10, padding: "10px 12px" }}>

                <p style={{ fontSize: 15, color: "#222", lineHeight: 1.6, margin: 0 }}>Today I will notice opportunities to {dayData.morning.intention}</p>

      </div>

      {entries.length === 0 ? (
        <div style={{ background: "#fff", borderRadius: 16, padding: "40px 24px", textAlign: "center", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          <p style={{ fontSize: 40, margin: "0 0 16px" }}>🌱</p>
          <p style={{ fontSize: 17, fontWeight: 700, color: "#1A1A2E", margin: "0 0 8px" }}>No past entries yet</p>
          <p style={{ fontSize: 15, color: "#555", lineHeight: 1.6 }}>Complete your first day and it will appear here tomorrow. Keep going — every entry is a step toward a rewired brain.</p>
        </div>
      ) : (
        <>
          <div style={{ background: "#F5F0FF", borderRadius: 14, padding: "12px 16px", marginBottom: 16, border: "1px solid #D1C4E9" }}>
            <p style={{ fontSize: 14, color: "#5E35B1", lineHeight: 1.6, margin: 0 }}>
              <strong>{entries.length} day{entries.length !== 1 ? "s" : ""} logged.</strong> Tap any entry to read your full notes for that day.
            </p>
          </div>
          {entries.map(date => {
            const d = new Date(date + "T12:00:00");
            const weekday = d.toLocaleDateString("en-US", { weekday: "short" });
            const dayNum = d.getDate();
            const monthYear = d.toLocaleDateString("en-US", { month: "long", year: "numeric" });
            return (
              <button key={date} onClick={() => loadDay(date)} style={{
                width: "100%", background: "#fff", border: "none", borderRadius: 14,
                padding: "14px 16px", marginBottom: 8, cursor: "pointer",
                display: "flex", alignItems: "center", gap: 14,
                boxShadow: "0 1px 4px rgba(0,0,0,0.06)", textAlign: "left",
                transition: "box-shadow 0.15s",
              }}>
                <div style={{ width: 48, height: 48, borderRadius: 12, background: "#EDE7F6", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <span style={{ fontSize: 10, fontWeight: 800, color: "#7B4BBF", textTransform: "uppercase", letterSpacing: 0.5 }}>{weekday}</span>
                  <span style={{ fontSize: 20, fontWeight: 800, color: "#5E35B1", lineHeight: 1 }}>{dayNum}</span>
                </div>
                <div style={{ flex: 1 }}>
                  <p style={{ fontSize: 15, fontWeight: 700, color: "#1A1A2E", margin: "0 0 2px" }}>{monthYear}</p>
                  <p style={{ fontSize: 13, color: "#666", margin: 0 }}>Tap to view full entry</p>
                </div>
                <span style={{ color: "#BDBDBD", fontSize: 20 }}>›</span>
              </button>
            );
          })}
        </>
      )}
    </div>
  );
}

function App() {
  const key = todayKey();
  const [morning, setMorning, ml] = useStorage(`morning:${key}`, {});
  const [midday, setMidday, mdl] = useStorage(`midday:${key}`, {});
  const [evening, setEvening, el] = useStorage(`evening:${key}`, {});
  const [weekly, setWeekly, wl] = useStorage(`week:${key.slice(0,7)}`, {});
  const [mode, setMode, modeLoaded] = useStorage("user:mode", null);
  const [tab, setTab] = useState("onboarding");

  // Once mode loads, decide starting tab
  useEffect(() => {
    if (modeLoaded && mode !== null) setTab("intro");
  }, [modeLoaded, mode]);

  const handleChooseMode = async (chosen) => {
    await setMode(chosen);
    setTab("morning");
  };

  const handleChangeMode = (chosen) => {
    setMode(chosen);
  };

  const tabs = [
    { id: "intro",     emoji: "🏠", label: "Home",    color: "#7B4BBF" },
    { id: "morning",   emoji: "🌅", label: "Morning", color: "#7B4BBF" },
    { id: "midday",    emoji: "☀️",  label: "Midday",  color: "#00897B" },
    { id: "evening",   emoji: "🌙", label: "Evening", color: "#E65100" },
    { id: "weekly",    emoji: "📊", label: "Weekly",  color: "#1565C0" },
    { id: "archive",   emoji: "📅", label: "Archive", color: "#7B4BBF" },
    { id: "reference", emoji: "📖", label: "Guide",   color: "#5E35B1" },
  ];

  const today = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

  if (!ml || !mdl || !el || !wl || !modeLoaded) return (
    <div style={{ minHeight: "100vh", background: "#F2F4F8", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <p style={{ color: "#666", letterSpacing: 2, fontSize: 13 }}>Loading...</p>
    </div>
  );

  // Show onboarding on very first launch (mode not yet set)
  if (tab === "onboarding" || mode === null) return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Serif+Display&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #F2F4F8; font-family: 'DM Sans', sans-serif; color: #1A1A2E; -webkit-font-smoothing: antialiased; }
        button { font-family: 'DM Sans', sans-serif; }
      `}</style>
      <div style={{ maxWidth: 480, margin: "0 auto", minHeight: "100vh", padding: "32px 20px 60px" }}>
        <OnboardingPage onChoose={handleChooseMode} />
      </div>
    </>
  );

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Serif+Display&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #F2F4F8; font-family: 'DM Sans', sans-serif; color: #1A1A2E; -webkit-font-smoothing: antialiased; }
        textarea { font-family: 'DM Sans', sans-serif; }
        textarea::placeholder { color: #AAAAAA; font-size: 15px; }
        button { font-family: 'DM Sans', sans-serif; }
      `}</style>

      <div style={{ maxWidth: 480, margin: "0 auto", minHeight: "100vh", display: "flex", flexDirection: "column" }}>

        {/* Header */}
        <div style={{ background: "#fff", padding: "16px 20px 0", boxShadow: "0 1px 0 #EEEEEE", position: "sticky", top: 0, zIndex: 100 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div>
              <h1 style={{ fontSize: 19, fontWeight: 800, color: "#1A1A2E", fontFamily: "'DM Serif Display', serif", margin: 0, letterSpacing: -0.3 }}>Abundance Mindset</h1>
              <p style={{ fontSize: 14, color: "#555", margin: "2px 0 0" }}>{today}</p>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontSize: 13, color: mode === "full" ? "#7B4BBF" : "#00897B", fontWeight: 700, background: mode === "full" ? "#EDE7F6" : "#E0F2F1", padding: "3px 10px", borderRadius: 20 }}>
                {mode === "full" ? "🌿 Full" : "⚡ Quick"}
              </span>
              <div style={{ fontSize: 13, color: "#2E7D32", fontWeight: 700, background: "#E8F5E9", padding: "3px 10px", borderRadius: 20 }}>✓ saved</div>
            </div>
          </div>
          <div style={{ display: "flex", marginLeft: -20, marginRight: -20, paddingLeft: 8, paddingRight: 8, overflowX: "auto" }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{
                flex: "0 0 auto", padding: "10px 12px", background: "none", border: "none",
                cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                borderBottom: `3px solid ${tab === t.id ? t.color : "transparent"}`,
                transition: "border-color 0.2s", minWidth: 64,
              }}>
                <span style={{ fontSize: 18 }}>{t.emoji}</span>
                <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", color: tab === t.id ? t.color : "#BDBDBD" }}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* Page content */}
        <div style={{ flex: 1, padding: "20px 16px 80px" }}>
          {tab === "intro"     && <IntroPage onStart={() => setTab("morning")} mode={mode} onChangeMode={handleChangeMode} />}
          {tab === "morning"   && <MorningPage   data={morning} setData={setMorning} onGuide={() => setTab("reference")} mode={mode} />}
          {tab === "midday"    && <MiddayPage    data={midday}  setData={setMidday}  onGuide={() => setTab("reference")} />}
          {tab === "evening"   && <EveningPage   data={evening} setData={setEvening} onGuide={() => setTab("reference")} mode={mode} />}
          {tab === "weekly"    && <WeeklyPage    data={weekly}  setData={setWeekly}  onGuide={() => setTab("reference")} />}
          {tab === "archive"   && <ArchivePage />}
          {tab === "reference" && <ReferencePage />}
        </div>

        <div style={{ background: "#fff", borderTop: "1px solid #F0F0F0", padding: "10px 20px", textAlign: "center" }}>
          <p style={{ fontSize: 13, color: "#555" }}>Entries save automatically · Past days viewable in Archive</p>
        </div>
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

  </script>
</body>
</html>
